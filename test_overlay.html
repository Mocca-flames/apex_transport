<!DOCTYPE html>
<html lang="en" style="margin:0">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}
.coverage-slide{position:relative;width:90vw;height:80vh;background:#e8e8e8;display:grid;grid-template-areas:'frame';overflow:hidden}
.coverage-slide__frame{grid-area:frame;width:100%;height:100%}
.coverage-slide__map{width:100%;height:100%;object-fit:contain;background:rgba(200,200,100,0.3)}
.coverage-slide.is-active .coverage-slide__map{opacity:1}
.coverage-slide__text{grid-area:frame;position:relative;z-index:2;padding:20px 24px;background:rgba(255,100,0,0.9);color:#fff;line-height:1.6}
</style>
</head>
<body>
<div class="coverage-slide">
  <div class="coverage-slide__frame">
    <img class="coverage-slide__map" src="https://picsum.photos/400/800">
  </div>
  <p class="coverage-slide__text"><strong>(Hub)</strong> — Johannesburg dispatch HQ, 24/7 monitoring</p>
</div>
</body>
</html>
