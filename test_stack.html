<!DOCTYPE html>
<html class="tier-2">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:sans-serif}

/* Simulate .coverage-slide at exact desktop size */
.coverage-slide{
  width:100vw;
  height:100vh;
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
  padding:80px;
  background:#f0f0f0;
}

.coverage-slide__map-wrap,
.coverage-slide__text{
  position:absolute;
  inset:0;
}

.coverage-slide__map-wrap{z-index:1;overflow:hidden}
.coverage-slide__map{
  width:100%;height:100%;
  object-fit:contain;
  background:rgba(200,220,255,0.3);
  opacity:1;
}
.coverage-slide__text{
  z-index:2;
  inset-inline:0; top:0;
  max-width:none;
  padding:24px;
  font-size:18px;color:#333;line-height:1.8;
  background:linear-gradient(to bottom,rgba(255,255,255,0.9) 0%,rgba(255,255,255,0.7) 60%,transparent 100%);
  overflow-y:auto;pointer-events:none;
}
</style>
</head>
<body>
<div class="coverage-slide">
  <div class="coverage-slide__map-wrap">
    <img class="coverage-slide__map" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='700'><rect fill='%23dde' width='1200' height='700'/><text x='600' y='380' font-size='60' text-anchor='middle' fill='%23666'>MAP LAYER z:1</text></svg>">
  </div>
  <p class="coverage-slide__text"><strong>(Hub)</strong> — Johannesburg dispatch HQ, 24/7 monitoring, border agents at Beit Bridge &amp; Tlokweng</p>
</div>
</body>
</html>
